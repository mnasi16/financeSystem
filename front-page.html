<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money tracking system</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-blue-500 text-white p-8 flex flex-col items-center justify-center ">
    <h1 class="p-6 text-2xl font-bold">Welcome to the money tracking system</h1>
    <p>This is a simple digital system that helps you to track your expenses and income.<br>
    To get started, simply create an account or login if you already have one</p>
    <div>
        <div class="bg-gray-700 text-white rounded-lg p-6 mt-6 hover:shadow-2xl">
            <h3 class="text-xl font-bold flex flex-col">Login form</h3>
            <form action="" method="post">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required><br><br>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required><br><br>
                <button type="button" onclick="verify()" class="bg-blue-500 hover:bg-blue-700 h shadow-lg text-white font-bold py-2 px-4 rounded-lg ">login</button>
                <p>Don't have an account? <a href="register.html" class="text-blue-300 hover:text-blue-500">Register here</a></p>
            </form>
        </div>
    </div>
</body>
</html>
